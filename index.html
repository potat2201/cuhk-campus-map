<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUHK Campus Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="map"></div>

  <div class="title-badge">
  <h1>CUHK Campus Map</h1>
  <p>香港中文大學校園地圖</p>
  </div>

  <div id="path-picker" class="path-picker is-hidden" aria-live="polite">
    <p id="path-picker-text" class="path-picker__text"></p>
    <button type="button" id="path-picker-clear" class="path-picker__clear" hidden>Clear path</button>
  </div>

  <aside id="filter-panel" class="filter-panel" aria-label="Map filter">
    <div class="filter-panel__header">
      <h2>Map filter</h2>
      <p>Use this filter to change the hotspots displayed on the map.</p>
      <button type="button" id="filter-close" class="filter-panel__close" aria-label="Close filter panel">
        <span class="chevron">›</span> Close
      </button>
    </div>
    <ul class="filter-list" id="filter-list">
      <li>
        <button type="button" class="filter-item filter-item--landmark active" data-category="landmark" aria-pressed="true">
          <span class="filter-item__check" aria-hidden="true">✓</span>
          <span class="filter-item__label">Signature landmarks</span>
          <span class="filter-item__chevron" aria-hidden="true">⌄</span>
        </button>
      </li>
      <li>
        <button type="button" class="filter-item filter-item--building active" data-category="building" aria-pressed="true">
          <span class="filter-item__check" aria-hidden="true">✓</span>
          <span class="filter-item__label">Key buildings</span>
          <span class="filter-item__chevron" aria-hidden="true">⌄</span>
        </button>
      </li>
      <li>
        <button type="button" class="filter-item filter-item--college active" data-category="college" aria-pressed="true">
          <span class="filter-item__check" aria-hidden="true">✓</span>
          <span class="filter-item__label">Colleges</span>
          <span class="filter-item__chevron" aria-hidden="true">⌄</span>
        </button>
      </li>
    </ul>
  </aside>

  <button type="button" id="filter-open" class="filter-open" aria-label="Open map filter" hidden>
    Filter
  </button>

  <div class="layer-switcher" role="group" aria-label="Map layer">
    <button type="button" id="layer-map" class="layer-btn active" aria-pressed="true">Map</button>
    <button type="button" id="layer-satellite" class="layer-btn" aria-pressed="false">Satellite</button>
  </div>

  <aside id="location-detail" class="location-detail is-hidden" aria-hidden="true" aria-labelledby="location-detail-title-zh">
    <button type="button" id="location-detail-close" class="location-detail__close" aria-label="Close location details">×</button>
    <div class="location-detail__image-wrap">
      <img id="location-detail-image" class="location-detail__image" src="" alt="">
    </div>
    <div class="location-detail__body">
      <div class="location-detail__header-row">
        <button type="button" id="location-detail-prev" class="location-detail__nav-btn" aria-label="Previous stop" hidden>←</button>
        <div class="location-detail__titles">
          <h2 id="location-detail-title-zh" class="location-detail__title"></h2>
          <p id="location-detail-title-en" class="location-detail__title-en"></p>
        </div>
        <button type="button" id="location-detail-next" class="location-detail__nav-btn" aria-label="Next stop" hidden>→</button>
      </div>
      <p id="location-detail-desc-zh" class="location-detail__desc"></p>
      <p id="location-detail-desc-en" class="location-detail__desc-en"></p>
      <a id="location-detail-link" class="location-detail__link" href="#" target="_blank" rel="noopener noreferrer">Learn more →</a>
    </div>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
